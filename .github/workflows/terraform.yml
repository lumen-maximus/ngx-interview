name: CI/CD

on:
  pull_request:
    paths:
      - "terraform/**"
      - "app/**"
      - ".github/workflows/terraform.yml"
  workflow_dispatch:
    inputs:
      apply:
        description: "Run terraform apply"
        required: false
        default: "false"

# OIDC requires id-token: write. contents: read is least-privilege for checkout.
permissions:
  contents: read
  id-token: write

env:
  AWS_REGION: ${{ vars.AWS_REGION || 'us-east-1' }}
  TF_WORKING_DIR: terraform

jobs:
  python-tests:
    name: Python unit tests
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest
          pip install -r app/requirements.txt

      - name: Run pytest
        env:
          AWS_DEFAULT_REGION: us-east-1
          AWS_ACCESS_KEY_ID: testing
          AWS_SECRET_ACCESS_KEY: testing
        run: pytest app -v

  terraform:
    name: Terraform fmt / validate / test / plan
    runs-on: ubuntu-latest
    needs: python-tests
    defaults:
      run:
        working-directory: ${{ env.TF_WORKING_DIR }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Check AWS_ROLE_ARN configured
        id: aws_check
        run: |
          if [ -z "${{ vars.AWS_ROLE_ARN }}" ]; then
            echo "configured=false" >> "$GITHUB_OUTPUT"
            echo "::warning::AWS_ROLE_ARN repository variable is not set. Skipping AWS-authenticated steps. See README for OIDC setup."
          else
            echo "configured=true" >> "$GITHUB_OUTPUT"
          fi

      - name: Configure AWS Credentials (OIDC)
        if: steps.aws_check.outputs.configured == 'true'
        uses: aws-actions/configure-aws-credentials@v4
        with:
          role-to-assume: ${{ vars.AWS_ROLE_ARN }}
          role-session-name: gha-ngx-interview-${{ github.run_id }}
          aws-region: ${{ env.AWS_REGION }}

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v3

      - name: Terraform Format Check
        run: terraform fmt -check -recursive

      - name: Terraform Init
        if: steps.aws_check.outputs.configured == 'true'
        run: terraform init

      - name: Terraform Init (no-backend, validation only)
        if: steps.aws_check.outputs.configured != 'true'
        run: terraform init -backend=false

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Test
        if: steps.aws_check.outputs.configured == 'true'
        run: terraform test

      - name: Terraform Plan
        if: steps.aws_check.outputs.configured == 'true'
        run: terraform plan -out=tfplan

      - name: Upload Terraform Plan
        if: steps.aws_check.outputs.configured == 'true' && success()
        uses: actions/upload-artifact@v4
        with:
          name: tfplan
          path: ${{ env.TF_WORKING_DIR }}/tfplan
          retention-days: 7

      - name: Terraform Apply
        if: ${{ steps.aws_check.outputs.configured == 'true' && github.event_name == 'workflow_dispatch' && github.event.inputs.apply == 'true' }}
        run: terraform apply -auto-approve tfplan
